<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Fantasy simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #game {
            background: #0a0e1a;
            padding: 20px;
            border-radius: 15px;
            width: 800px;
            max-width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a4a;
        }

        h1 {
            text-align: center;
            color: #ffcc44;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #status {
            background: #111522;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            font-size: 14px;
        }

        .stat-card {
            background: #1a1f2e;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            color: #ccc;
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: bold;
            color: #ffcc44;
        }

        .hp-bar-container {
            background: #2a1a1a;
            height: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .hp-bar-fill {
            background: #44ff44;
            height: 100%;
            width: 100%;
            transition: width 0.3s;
        }

        #log {
            background: #0a0e16;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #aaffaa;
            border: 1px solid #2a2a4a;
        }

        #log::-webkit-scrollbar {
            width: 8px;
        }

        #log::-webkit-scrollbar-track {
            background: #1a1a2a;
        }

        #log::-webkit-scrollbar-thumb {
            background: #ffcc44;
            border-radius: 4px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #ffcc44;
            color: #1a1a2e;
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .attack { background: #aa3333; }
        .magic { background: #3333aa; }
        .flee { background: #33aa33; }
        .explore { background: #ff8844; }
    </style>
</head>
<body>
    <div id="game">
        <h1>FINAL FANTASY SIMULATOR</h1>
        
        <div id="status">
            <div class="stat-card">
                <div class="label">HP</div>
                <div class="value"><span id="hp">0</span>/<span id="hpMax">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">LEVEL</div>
                <div class="value"><span id="lvl">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">EXP</div>
                <div class="value"><span id="xp">0</span>/<span id="xpNext">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">STR</div>
                <div class="value"><span id="forca">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">MAG</div>
                <div class="value"><span id="poder">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">LCK</div>
                <div class="value"><span id="sorte">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">DEF</div>
                <div class="value"><span id="res">0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">AGI</div>
                <div class="value"><span id="vel">0</span></div>
            </div>
        </div>
        
        <div class="hp-bar-container">
            <div class="hp-bar-fill" id="hpBar"></div>
        </div>
        
        <div id="log">
            Welcome to Final Fantasy Simulator!<br>
            Click EXPLORE to start your journey...
        </div>
        
        <div class="buttons">
            <button id="exploreBtn" class="explore">EXPLORE</button>
            <button id="attackBtn" class="attack" disabled>ATTACK</button>
            <button id="magicBtn" class="magic" disabled>MAGIC</button>
            <button id="fleeBtn" class="flee" disabled>FLEE</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
